<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitalNet OS - GAP Asset Simulation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #05080f;
            color: #c8d6e5;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ── Starfield background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,0.15), transparent),
                radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.1), transparent),
                radial-gradient(1.2px 1.2px at 60% 20%, rgba(255,255,255,0.12), transparent),
                radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.08), transparent);
            background-size: 550px 550px, 350px 350px, 250px 250px, 450px 450px;
            animation: drift 120s linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes drift {
            to { background-position: 550px 550px, -350px 350px, 250px -250px, -450px 450px; }
        }

        /* ── HUD Overlay ── */
        #overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: rgba(5, 8, 15, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px 28px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 12px;
            min-width: 320px;
            box-shadow:
                0 0 30px rgba(0, 255, 136, 0.05),
                inset 0 1px 0 rgba(255,255,255,0.04);
        }
        #overlay h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ff88;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #overlay h2::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff88, 0 0 20px rgba(0,255,136,0.3);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .hud-row:last-child { border-bottom: none; }
        .hud-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #5a6e82;
        }
        .hud-value {
            font-weight: 500;
            font-size: 0.85rem;
        }
        #ws-status {
            color: #ffaa00;
            transition: color 0.4s ease;
        }
        #node-count {
            color: #00ff88;
            font-weight: 700;
            font-size: 1.1rem;
        }
        #avg-score {
            color: #00ccff;
            font-weight: 700;
        }
        #top-sat {
            color: #ff6b9d;
            font-weight: 500;
            font-size: 0.75rem;
        }

        /* ── Score Distribution Bar ── */
        #score-bar-container {
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        #score-bar-container .hud-label {
            margin-bottom: 8px;
            display: block;
        }
        .score-bar {
            display: flex;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            gap: 1px;
        }
        .score-segment {
            transition: flex 0.6s ease;
            border-radius: 2px;
        }
        .score-segment.critical { background: #ff3344; }
        .score-segment.warning  { background: #ffaa00; }
        .score-segment.nominal  { background: #00ff88; }
        .score-segment.optimal  { background: #00ccff; }

        .bar-legend {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }
        .bar-legend span {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5a6e82;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .bar-legend span::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
        }
        .legend-critical::before { background: #ff3344 !important; }
        .legend-warning::before  { background: #ffaa00 !important; }
        .legend-nominal::before  { background: #00ff88 !important; }
        .legend-optimal::before  { background: #00ccff !important; }

        /* ── Globe Canvas ── */
        #globeContainer {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        canvas {
            display: block;
        }

        /* ── Satellite Info Tooltip ── */
        #sat-tooltip {
            display: none;
            position: fixed;
            z-index: 300;
            background: rgba(5, 8, 15, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 136, 0.25);
            border-radius: 8px;
            padding: 14px 18px;
            min-width: 240px;
            pointer-events: none;
            box-shadow: 0 0 24px rgba(0,255,136,0.08);
        }
        #sat-tooltip h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: #00ff88;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        #sat-tooltip .tip-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            padding: 2px 0;
            color: #8899aa;
        }
        #sat-tooltip .tip-row .tip-val {
            color: #c8d6e5;
            font-weight: 500;
        }

        /* ── Loading Spinner ── */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #05080f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loader-ring {
            width: 48px; height: 48px;
            border: 2px solid rgba(0,255,136,0.1);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-screen p {
            margin-top: 16px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #5a6e82;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-ring"></div>
        <p>Initializing Operational Environment…</p>
    </div>

    <!-- HUD Overlay -->
    <div id="overlay">
        <h2>OrbitalNet OS</h2>
        <div class="hud-row">
            <span class="hud-label">Status</span>
            <span class="hud-value" id="ws-status">Connecting…</span>
        </div>
        <div class="hud-row">
            <span class="hud-label">Live Nodes</span>
            <span class="hud-value" id="node-count">0</span>
        </div>
        <div class="hud-row">
            <span class="hud-label">Avg Score (C<sub>i</sub>)</span>
            <span class="hud-value" id="avg-score">—</span>
        </div>
        <div class="hud-row">
            <span class="hud-label">Top Performer</span>
            <span class="hud-value" id="top-sat">—</span>
        </div>
        <div id="score-bar-container">
            <span class="hud-label">Fleet Health</span>
            <div class="score-bar">
                <div class="score-segment critical" id="bar-critical" style="flex:1"></div>
                <div class="score-segment warning"  id="bar-warning"  style="flex:1"></div>
                <div class="score-segment nominal"  id="bar-nominal"  style="flex:1"></div>
                <div class="score-segment optimal"  id="bar-optimal"  style="flex:1"></div>
            </div>
            <div class="bar-legend">
                <span class="legend-critical">Critical</span>
                <span class="legend-warning">Warning</span>
                <span class="legend-nominal">Nominal</span>
                <span class="legend-optimal">Optimal</span>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="sat-tooltip">
        <h3 id="tip-name"></h3>
        <div class="tip-row"><span>Score</span><span class="tip-val" id="tip-score"></span></div>
        <div class="tip-row"><span>Position</span><span class="tip-val" id="tip-pos"></span></div>
        <div class="tip-row"><span>Velocity</span><span class="tip-val" id="tip-vel"></span></div>
        <div class="tip-row"><span>Battery SOC</span><span class="tip-val" id="tip-soc"></span></div>
        <div class="tip-row"><span>Thermal</span><span class="tip-val" id="tip-thermal"></span></div>
        <div class="tip-row"><span>ISL Throughput</span><span class="tip-val" id="tip-isl"></span></div>
    </div>

    <div id="globeContainer"></div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
    (() => {
        // ─── CONSTANTS ───
        const EARTH_RADIUS   = 80;           // render-space units
        const SCALE_FACTOR   = EARTH_RADIUS / 6371;  // km → render units
        const SAT_BASE_SIZE  = 1.2;

        // ─── THREE.JS SCENE ───
        const container = document.getElementById('globeContainer');
        const scene     = new THREE.Scene();
        const camera    = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 60, 250);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 120;
        controls.maxDistance = 600;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;

        // ─── LIGHTING ───
        scene.add(new THREE.AmbientLight(0x334455, 0.6));
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(200, 100, 150);
        scene.add(sunLight);
        const rimLight = new THREE.DirectionalLight(0x0066ff, 0.3);
        rimLight.position.set(-150, -50, -100);
        scene.add(rimLight);

        // ─── EARTH ───
        const earthGeom = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
        const earthMat  = new THREE.MeshPhongMaterial({
            color: 0x0a1628,
            emissive: 0x04101e,
            specular: 0x222244,
            shininess: 15,
            transparent: true,
            opacity: 0.92,
        });
        const earth = new THREE.Mesh(earthGeom, earthMat);
        scene.add(earth);

        // Atmosphere glow
        const atmosGeom = new THREE.SphereGeometry(EARTH_RADIUS * 1.015, 64, 64);
        const atmosMat  = new THREE.MeshPhongMaterial({
            color: 0x00aaff,
            emissive: 0x003366,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide,
        });
        scene.add(new THREE.Mesh(atmosGeom, atmosMat));

        // Wireframe grid overlay
        const gridGeom = new THREE.SphereGeometry(EARTH_RADIUS * 1.002, 36, 18);
        const gridMat  = new THREE.MeshBasicMaterial({
            color: 0x00ff88,
            wireframe: true,
            transparent: true,
            opacity: 0.06,
        });
        scene.add(new THREE.Mesh(gridGeom, gridMat));

        // ─── ORBIT RING (decorative equatorial) ───
        const orbitCurve = new THREE.RingGeometry(EARTH_RADIUS * 1.6, EARTH_RADIUS * 1.62, 128);
        const orbitMat   = new THREE.MeshBasicMaterial({
            color: 0x00ff88,
            transparent: true,
            opacity: 0.08,
            side: THREE.DoubleSide,
        });
        const orbitRing = new THREE.Mesh(orbitCurve, orbitMat);
        orbitRing.rotation.x = Math.PI / 2;
        scene.add(orbitRing);

        // ─── SATELLITE BUFFER GEOMETRY ───
        const MAX_SATS = 1000;
        const satGeometry = new THREE.BufferGeometry();
        const positions   = new Float32Array(MAX_SATS * 3);
        const colors      = new Float32Array(MAX_SATS * 3);
        const sizes       = new Float32Array(MAX_SATS);
        satGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        satGeometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
        satGeometry.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

        // Custom shader for glowing particles
        const satMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
            },
            vertexShader: `
                attribute float size;
                attribute vec3 color;
                varying vec3 vColor;
                varying float vSize;
                void main() {
                    vColor = color;
                    vSize = size;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (200.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vSize;
                void main() {
                    float d = length(gl_PointCoord - 0.5);
                    if (d > 0.5) discard;
                    float glow = 1.0 - smoothstep(0.0, 0.5, d);
                    gl_FragColor = vec4(vColor, glow * 0.9);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
        });

        const satPoints = new THREE.Points(satGeometry, satMaterial);
        scene.add(satPoints);

        // ─── STATE ───
        let fleetData = [];
        let activeSatCount = 0;

        // Score → Color mapping
        function scoreToColor(score) {
            if (score <= 0.0)  return new THREE.Color(0.6, 0.0, 0.0);   // dead / gatekept → dim red
            if (score < 1.0)   return new THREE.Color(1.0, 0.2, 0.25);  // critical → red
            if (score < 2.0)   return new THREE.Color(1.0, 0.65, 0.0);  // warning → amber
            if (score < 3.0)   return new THREE.Color(0.0, 1.0, 0.53);  // nominal → green
            return new THREE.Color(0.0, 0.8, 1.0);                      // optimal → cyan
        }

        // ─── UPDATE SATELLITES ───
        function updateSatellitePositions() {
            activeSatCount = Math.min(fleetData.length, MAX_SATS);

            let totalScore = 0;
            let topSat = { id: '—', score: -1 };
            let buckets = [0, 0, 0, 0]; // critical, warning, nominal, optimal

            for (let i = 0; i < activeSatCount; i++) {
                const sat = fleetData[i];
                const px = sat.position.x * SCALE_FACTOR;
                const py = sat.position.y * SCALE_FACTOR;
                const pz = sat.position.z * SCALE_FACTOR;
                const score = sat.current_score || 0;

                positions[i * 3]     = px;
                positions[i * 3 + 1] = py;
                positions[i * 3 + 2] = pz;

                const c = scoreToColor(score);
                colors[i * 3]     = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;

                sizes[i] = SAT_BASE_SIZE + score * 0.5;

                totalScore += score;
                if (score > topSat.score) topSat = { id: sat.id, score };

                if (score < 1.0)      buckets[0]++;
                else if (score < 2.0) buckets[1]++;
                else if (score < 3.0) buckets[2]++;
                else                  buckets[3]++;
            }

            // Hide unused points
            for (let i = activeSatCount; i < MAX_SATS; i++) {
                positions[i * 3] = positions[i * 3 + 1] = positions[i * 3 + 2] = 0;
                sizes[i] = 0;
            }

            satGeometry.attributes.position.needsUpdate = true;
            satGeometry.attributes.color.needsUpdate    = true;
            satGeometry.attributes.size.needsUpdate     = true;

            // ── Update HUD ──
            document.getElementById('node-count').textContent = activeSatCount;
            document.getElementById('avg-score').textContent =
                activeSatCount > 0 ? (totalScore / activeSatCount).toFixed(4) : '—';
            document.getElementById('top-sat').textContent =
                topSat.score >= 0 ? `${topSat.id}  (${topSat.score.toFixed(3)})` : '—';

            // Score distribution bar
            const total = Math.max(activeSatCount, 1);
            document.getElementById('bar-critical').style.flex = buckets[0] / total;
            document.getElementById('bar-warning').style.flex  = buckets[1] / total;
            document.getElementById('bar-nominal').style.flex  = buckets[2] / total;
            document.getElementById('bar-optimal').style.flex  = buckets[3] / total;
        }

        // ─── RAYCASTER FOR HOVER TOOLTIP ───
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 2.5;
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('sat-tooltip');

        renderer.domElement.addEventListener('mousemove', (e) => {
            mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(satPoints);

            if (hits.length > 0 && fleetData.length > 0) {
                const idx = hits[0].index;
                if (idx < fleetData.length) {
                    const sat = fleetData[idx];
                    tooltip.style.display = 'block';
                    tooltip.style.left = (e.clientX + 16) + 'px';
                    tooltip.style.top  = (e.clientY + 16) + 'px';
                    document.getElementById('tip-name').textContent    = sat.id;
                    document.getElementById('tip-score').textContent   = (sat.current_score || 0).toFixed(4);
                    document.getElementById('tip-pos').textContent     =
                        `${sat.position.x.toFixed(1)}, ${sat.position.y.toFixed(1)}, ${sat.position.z.toFixed(1)} km`;
                    document.getElementById('tip-vel').textContent     =
                        `${sat.velocity.vx.toFixed(2)}, ${sat.velocity.vy.toFixed(2)}, ${sat.velocity.vz.toFixed(2)} km/s`;
                    const gk = sat.telemetry?.P0_Gatekeepers || {};
                    document.getElementById('tip-soc').textContent     = ((gk.soc || 0) * 100).toFixed(1) + '%';
                    document.getElementById('tip-thermal').textContent = ((gk.thermal_margin || 0) * 100).toFixed(1) + '%';
                    const eff = sat.telemetry?.P2_Efficiency || {};
                    document.getElementById('tip-isl').textContent     = ((eff.isl_throughput || 0) * 100).toFixed(1) + '%';
                    return;
                }
            }
            tooltip.style.display = 'none';
        });

        // ─── WEBSOCKET ───
        const statusText = document.getElementById('ws-status');
        const loadingScreen = document.getElementById('loading-screen');
        let firstFrame = true;

        function connectWS() {
            const ws = new WebSocket('ws://localhost:8765');

            ws.onopen = () => {
                statusText.innerText = 'Connected ● 1 Hz';
                statusText.style.color = '#00ff88';
            };

            ws.onmessage = (event) => {
                fleetData = JSON.parse(event.data);
                updateSatellitePositions();
                if (firstFrame) {
                    firstFrame = false;
                    loadingScreen.classList.add('fade-out');
                    setTimeout(() => loadingScreen.style.display = 'none', 900);
                }
            };

            ws.onclose = () => {
                statusText.innerText = 'Reconnecting…';
                statusText.style.color = '#ffaa00';
                setTimeout(connectWS, 3000);
            };

            ws.onerror = () => ws.close();
        }
        connectWS();

        // ─── RENDER LOOP ───
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();
            satMaterial.uniforms.uTime.value = elapsed;
            earth.rotation.y += 0.0008;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // ─── RESIZE ───
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    })();
    </script>
</body>
</html>
